# インストーラーでは自動インストールしないが、便利な MCP サーバーの紹介リスト
# インストール完了後に Note として表示される

- name: filesystem
  description: ローカルファイルシステムへの安全なアクセスを提供する MCP サーバー
  note: 許可するディレクトリをインストール時に指定する必要があります
